<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environmental LMS - Soweto Secondary School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.min.css" rel="stylesheet">
</head>

<body class="login-page">
    <a href="#content" class="visually-hidden-focusable skip-link">Skip to content</a>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center" role="main" id="content">
        <div class="login-container">
            <!-- Logo & Title -->
            <div class="text-center mb-4">
                <div class="logo-circle mb-3">
                    <i class="fas fa-leaf"></i>
                </div>
                <h1 class="fw-bold text-success">Environmental Learning Hub</h1>
                <p class="text-muted">Soweto Secondary School</p>
                <p class="small text-secondary">Enhancing Environmental Protection and Conservation</p>
            </div>

            <!-- Login Form -->
            <div class="login-form">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="studentName" class="form-label">Your Name</label>
                        <input type="text" class="form-control form-control-lg" id="studentName"
                            placeholder="Enter your full name" required>
                    </div>
                    <div class="mb-3">
                        <label for="studentID" class="form-label">Student ID</label>
                        <input type="text" class="form-control form-control-lg" id="studentID"
                            placeholder="e.g., SHS001" required>
                    </div>
                    <div class="mb-3">
                        <label for="gradeLevel" class="form-label">Grade Level</label>
                        <select class="form-select form-select-lg" id="gradeLevel" required>
                            <option value="">Select your class...</option>
                            <option value="form1">Form 1</option>
                            <option value="form2">Form 2</option>
                            <option value="form3">Form 3</option>
                            <option value="form4">Form 4</option>
                            <option value="form5">Form 5</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 mb-3">
                        <i class="fas fa-sign-in-alt" aria-hidden="true"></i> Start Learning Journey
                    </button>
                </form>

                <!-- Demo Login -->
                <div class="text-center">
                    <p class="text-muted small mb-2">Demo Account:</p>
                    <button type="button" class="btn btn-outline-secondary btn-sm" id="demoBtn"
                        aria-label="Load demo data">
                        Load Demo Data
                    </button>
                </div>
            </div>

            <!-- Course Info -->
            <div class="course-info mt-4 p-3 bg-light rounded">
                <h6 class="text-success mb-2"><i class="fas fa-info-circle"></i> Course Overview</h6>
                <ul class="small mb-0 ps-3">
                    <li><strong>Duration:</strong> 5 Days</li>
                    <li><strong>Mode:</strong> 20% Face-to-Face, 80% Online</li>
                    <li><strong>Focus:</strong> Environmental Conservation</li>
                    <li><strong>Access:</strong> Mobile & Desktop Friendly</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/localStorage.js" defer></script>
    <script src="js/main.js" defer></script>
</body>

</html>
